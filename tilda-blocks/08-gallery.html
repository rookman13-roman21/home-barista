<style>
  /* ─── GALLERY ─── */
  .mbs-hb-gallery {
    font-family: 'Mulish', sans-serif;
    background: #F5F5F5;
    padding: 90px 20px;
  }
  .mbs-hb-gallery * { box-sizing: border-box; }
  .mbs-hb-gallery__wrap { max-width: 1100px; margin: 0 auto; }
  .mbs-hb-gallery__header { margin-bottom: 44px; }
  .mbs-hb-gallery__label {
    display: inline-flex; align-items: center; gap: 7px;
    margin-bottom: 14px; padding: 7px 16px; border-radius: 999px;
    background: rgba(231,242,227,0.95); color: #417033;
    font-size: 13px; font-weight: 900;
  }
  .mbs-hb-gallery__title {
    font-size: 34px; font-weight: 900; letter-spacing: -0.04em;
    color: #1F1F1F; margin: 0;
  }
  .mbs-hb-gallery__grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }
  .mbs-hb-gallery__item {
    aspect-ratio: 1 / 1;
    overflow: hidden;
    border-radius: 20px;
  }
  .mbs-hb-gallery__item img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: transform .4s ease;
  }
  .mbs-hb-gallery__item:hover img {
    transform: scale(1.04);
  }

  @media (max-width: 820px) {
    .mbs-hb-gallery { padding: 64px 14px; }
    .mbs-hb-gallery__title { font-size: 28px; }
    .mbs-hb-gallery__grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }
    .mbs-hb-gallery__item { border-radius: 12px; }
  }
</style>
